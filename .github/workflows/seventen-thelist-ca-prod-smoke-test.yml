name: List - CA - Prod - Smoke Test (old)
on: workflow_dispatch
jobs:
  smoke-test-prod-ca:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      ENV: prod-ca thelist.710labs.com
      ENV_ID: prod-ca
      EXECUTION_TYPE: ${{ github.event_name == 'workflow_dispatch' && 'Manual Run' || 'Scheduled Run' }}
      ADMIN_USER: ${{ secrets.ADMIN_USER }}
      ADMIN_PW: ${{ secrets.ADMIN_PW }}
      CHECKOUT_PASSWORD: ${{ secrets.CHECKOUT_PASSWORD }}
      RECAPTCHA_BYPASS: ${{ secrets.RECAPTCHA_BYPASS }}
      API_KEY: ${{ secrets.API_KEY }}
      BASE_URL: ${{ secrets.BASE_URL_PROD_CA }}
      QA_ENDPOINT: /wp-content/plugins/seventen-qa/api/
      BYPASS_TAX_CALC: true
      NEXT_VERSION: true
      SLACK_BOT_USER_OAUTH_TOKEN: ${{ secrets.PW_TESTS_SLACKBOT_TOKEN}}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      S3_BUCKET: ${{ secrets.S3_BUCKET}}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY}}
      S3_SECRET: ${{ secrets.S3_SECRET}}
      S3_REGION: ${{ secrets.S3_REGION}}
    outputs:
      order-id: ${{ steps.extract.outputs.orderID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'
      - name: Install dependencies
        timeout-minutes: 15
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --no-audit --no-fund --fetch-timeout=600000 --fetch-retries=5
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npm run smoke:test:prod:ca
      - name: Read order_id.txt
        if: always()
        id: extract
        run: |
          if [[ -f order_id.txt ]]; then
            ORDER_ID=$(<order_id.txt)
            echo "✅ Found Order ID: $ORDER_ID"
            echo "orderID=$ORDER_ID" >> $GITHUB_OUTPUT
          else
            echo "⚠️  order_id.txt not found; setting empty orderID"
            # still emit the output key, just blank
            echo "orderID=" >> $GITHUB_OUTPUT
          fi
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
  cleanup:
    name: Cleanup Cancel Test Order
    needs: smoke-test-prod-ca
    runs-on: ubuntu-latest
    if: always()
    env:
      WC_CONSUMER_KEY: ${{ secrets.WOO_CA_PROD_KEY }}
      WC_CONSUMER_SECRET: ${{ secrets.WOO_CA_PROD_SECRET }}
      BASE_URL: ${{ secrets.BASE_URL_PROD_CA }}
    steps:
      - name: Cancel test order via WooCommerce API
        if: ${{ needs.smoke-test-prod-ca.outputs.order-id != '' }}
        run: |
          echo "🛠 Cancelling order ${{ needs.smoke-test-prod-ca.outputs.order-id }}…"
          curl -X PUT "${BASE_URL}/wp-json/wc/v3/orders/${{ needs.smoke-test-prod-ca.outputs.order-id }}" \
            -u "${WC_CONSUMER_KEY}:${WC_CONSUMER_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"status":"cancelled"}'

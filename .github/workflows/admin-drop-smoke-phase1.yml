name: Admin Drop Smoke
on:
  workflow_dispatch:
    inputs:
      target_env:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - stage
      grep:
        description: Optional Playwright grep filter
        required: false
        type: string
      include_menu_upload:
        description: Allow destructive menu-upload smoke
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'
      menu_fixture:
        description: Menu-upload fixture
        required: false
        default: smoke-default
        type: choice
        options:
          - smoke-default
          - smoke-alt
          - ca-menu-4-7-25
          - co-menu-4-7-25
jobs:
  admin-drop-smoke:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      ENV: ${{ github.event.inputs.target_env == 'stage' && 'stage-ca thelist-stage.710labs.com' || 'dev-ca thelist-dev.710labs.com' }}
      ENV_ID: ${{ github.event.inputs.target_env == 'stage' && 'stage-ca' || 'dev-ca' }}
      EXECUTION_TYPE: Manual Run
      RUN_ID: ${{ github.run_number }}
      UNIQUE_RUN_ID: ${{ github.run_id }}
      BASE_URL: ${{ github.event.inputs.target_env == 'stage' && secrets.BASE_URL_STAGE || secrets.BASE_URL_DEV }}
      ADMIN_USER: ${{ secrets.ADMIN_USER }}
      ADMIN_PW: ${{ secrets.ADMIN_PW }}
      API_KEY: ${{ secrets.API_KEY }}
      QA_ENDPOINT: ${{ secrets.QA_ENDPOINT }}
      PRIVATE_STORE_TEST_PASSWORD: ${{ secrets.PRIVATE_STORE_TEST_PASSWORD }}
      MENU_UPLOAD_FIXTURE: ${{ github.event.inputs.menu_fixture }}
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v3
        with:
          node-version: 'node'
      - name: Install dependencies
        run: npm ci
      - name: Set Domain to CA
        run: node ./scripts/set-qa-domain.js ca
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run admin-drop smoke tests
        run: |
          GREP_INPUT='${{ github.event.inputs.grep }}'
          INCLUDE_MENU_UPLOAD='${{ github.event.inputs.include_menu_upload }}'

          if [ "$INCLUDE_MENU_UPLOAD" != "yes" ] && echo "$GREP_INPUT" | grep -Eqi 'menu[[:space:]]*upload'; then
            echo "The destructive menu-upload smoke requires include_menu_upload=yes."
            exit 1
          fi

          if [ -n "$GREP_INPUT" ]; then
            if [ "$INCLUDE_MENU_UPLOAD" = "yes" ]; then
              npm run admin:smoke -- --grep "$GREP_INPUT"
            else
              npm run admin:smoke -- --grep "$GREP_INPUT" --grep-invert "Menu upload"
            fi
          elif [ "$INCLUDE_MENU_UPLOAD" = "yes" ]; then
            npm run admin:smoke
          else
            npm run admin:smoke -- --grep-invert "Menu upload"
          fi
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 3
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 3

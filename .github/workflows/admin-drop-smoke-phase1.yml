name: Admin Drop Smoke
on:
  workflow_dispatch:
    inputs:
      target_env:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - stage
      grep:
        description: Optional Playwright grep filter
        required: false
        type: string
      include_menu_upload:
        description: Allow destructive menu-upload smoke
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'
      include_focused_rules:
        description: Allow destructive focused-rules smoke
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'
      focused_rule_group:
        description: Focused-rules group
        required: true
        default: none
        type: choice
        options:
          - none
          - all
          - minorder
          - maxqty
      menu_fixture:
        description: Menu-upload fixture
        required: false
        default: ca-menu-4-7-25
        type: choice
        options:
          - smoke-default
          - smoke-alt
          - ca-menu-4-7-25
          - co-menu-4-7-25
concurrency:
  group: thelist-${{ github.event.inputs.target_env || 'dev' }}-domain-state
  cancel-in-progress: false
jobs:
  admin-drop-smoke:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      ENV: ${{ github.event.inputs.target_env == 'stage' && 'stage-ca thelist-stage.710labs.com' || 'dev-ca thelist-dev.710labs.com' }}
      ENV_ID: ${{ github.event.inputs.target_env == 'stage' && 'stage-ca' || 'dev-ca' }}
      EXECUTION_TYPE: Manual Run
      RUN_ID: ${{ github.run_number }}
      UNIQUE_RUN_ID: ${{ github.run_id }}
      BASE_URL: ${{ github.event.inputs.target_env == 'stage' && secrets.BASE_URL_STAGE || secrets.BASE_URL_DEV }}
      ADMIN_DROP_MERGED_REPORT: true
      PWTEST_BLOB_DO_NOT_REMOVE: 1
      NEXT_VERSION: true
      ADD_ADDRESS_BEFORE_CHECKOUT: true
      ADMIN_USER: ${{ secrets.ADMIN_USER }}
      ADMIN_PW: ${{ secrets.ADMIN_PW }}
      API_KEY: ${{ secrets.API_KEY }}
      QA_ENDPOINT: /wp-json/seventen-qa/v1/
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET: ${{ secrets.S3_SECRET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET }}
      CHECKOUT_PASSWORD: ${{ secrets.CHECKOUT_PASSWORD }}
      RECAPTCHA_BYPASS: ${{ secrets.RECAPTCHA_BYPASS }}
      PRIVATE_STORE_TEST_PASSWORD: ${{ secrets.PRIVATE_STORE_TEST_PASSWORD }}
      MENU_UPLOAD_FIXTURE: ${{ github.event.inputs.menu_fixture }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'
      - name: Install dependencies
        timeout-minutes: 15
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --no-audit --no-fund --fetch-timeout=600000 --fetch-retries=5
      - name: Set Domain to CA
        run: node ./scripts/set-qa-domain.js ca
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run admin-drop smoke tests
        id: admin-drop-tests
        run: |
          GREP_INPUT='${{ github.event.inputs.grep }}'
          INCLUDE_MENU_UPLOAD='${{ github.event.inputs.include_menu_upload }}'
          INCLUDE_FOCUSED_RULES='${{ github.event.inputs.include_focused_rules }}'
          FOCUSED_RULE_GROUP='${{ github.event.inputs.focused_rule_group }}'

          if [ "$INCLUDE_MENU_UPLOAD" != "yes" ] && echo "$GREP_INPUT" | grep -Eqi 'menu[[:space:]-]*upload|@menu-upload|@destructive'; then
            echo "The destructive menu-upload smoke requires include_menu_upload=yes."
            exit 1
          fi

          if [ "$INCLUDE_FOCUSED_RULES" != "yes" ]; then
            if [ "$FOCUSED_RULE_GROUP" != "none" ]; then
              echo "The destructive focused-rules smoke requires include_focused_rules=yes."
              exit 1
            fi

            if echo "$GREP_INPUT" | grep -Eqi '@admin-drop|@rules|@minorder|@maxqty|focused[[:space:]-]*rules'; then
              echo "The destructive focused-rules smoke requires include_focused_rules=yes."
              exit 1
            fi
          fi

          if [ "$INCLUDE_MENU_UPLOAD" != "yes" ]; then
            if [ "$FOCUSED_RULE_GROUP" = "minorder" ] || [ "$FOCUSED_RULE_GROUP" = "all" ]; then
              echo "The minimum-order smoke depends on an uploaded menu. Set include_menu_upload=yes when focused_rule_group=$FOCUSED_RULE_GROUP."
              exit 1
            fi

            if echo "$GREP_INPUT" | grep -Eqi '@minorder|@rules'; then
              echo "The minimum-order smoke depends on an uploaded menu. Set include_menu_upload=yes when requesting @minorder or @rules."
              exit 1
            fi
          fi

          if [ -n "$GREP_INPUT" ] && [ "$FOCUSED_RULE_GROUP" != "none" ]; then
            echo "Use either grep or focused_rule_group, not both."
            exit 1
          fi

          ADMIN_DROP_PHASE_INDEX=0

          run_admin_smoke() {
            ADMIN_DROP_PHASE_INDEX=$((ADMIN_DROP_PHASE_INDEX + 1))
            PLAYWRIGHT_BLOB_OUTPUT_NAME="admin-drop-${ADMIN_DROP_PHASE_INDEX}.zip" npx playwright test --config=configs/admin-drop.config.ts --workers=1 "$@"
          }

          if [ -n "$GREP_INPUT" ] && echo "$GREP_INPUT" | grep -Eqi '@rules'; then
            run_admin_smoke --grep "Menu upload"
            run_admin_smoke --grep "@minorder"
            run_admin_smoke --grep "@maxqty"
            exit 0
          fi

          ARGS=()
          if [ "$FOCUSED_RULE_GROUP" != "none" ]; then
            case "$FOCUSED_RULE_GROUP" in
              all)
                run_admin_smoke --grep "Menu upload"
                run_admin_smoke --grep "@minorder"
                run_admin_smoke --grep "@maxqty"
                exit 0
                ;;
              minorder)
                run_admin_smoke --grep "Menu upload"
                run_admin_smoke --grep "@minorder"
                exit 0
                ;;
              maxqty)
                ARGS+=(--grep "@maxqty")
                ;;
              *)
                echo "Unsupported focused_rule_group: $FOCUSED_RULE_GROUP"
                exit 1
                ;;
            esac
          elif [ -n "$GREP_INPUT" ]; then
            ARGS+=(--grep "$GREP_INPUT")
          fi

          GREP_INVERT_INPUT=''
          if [ "$INCLUDE_MENU_UPLOAD" != "yes" ]; then
            GREP_INVERT_INPUT='Menu upload'
          fi

          if [ "$FOCUSED_RULE_GROUP" = "none" ] && [ -z "$GREP_INPUT" ]; then
            if [ -n "$GREP_INVERT_INPUT" ]; then
              GREP_INVERT_INPUT="$GREP_INVERT_INPUT|@rules"
            else
              GREP_INVERT_INPUT='@rules'
            fi
          fi

          if [ -n "$GREP_INVERT_INPUT" ]; then
            ARGS+=(--grep-invert "$GREP_INVERT_INPUT")
          fi

          if echo "$GREP_INPUT" | grep -Eqi '@minorder'; then
            run_admin_smoke --grep "Menu upload"
          fi

          run_admin_smoke "${ARGS[@]}"
      - name: Merge Admin Drop Playwright reports
        id: merge-admin-drop-report
        if: always()
        continue-on-error: true
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report
          PLAYWRIGHT_HTML_OPEN: never
          PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/admin-drop-results.json
        run: |
          if [ -n "$(find blob-report -name '*.zip' -print -quit 2>/dev/null)" ]; then
            npx playwright merge-reports --reporter=html,json blob-report
          else
            echo "No Admin Drop blob reports found; skipping report merge."
          fi
      - name: Upload merged Playwright Report to S3
        if: always()
        continue-on-error: true
        run: node ./scripts/upload-playwright-report-s3.js
      - name: Send Admin Drop Slack notification
        if: always()
        continue-on-error: true
        env:
          ADMIN_DROP_TEST_OUTCOME: ${{ steps.admin-drop-tests.outcome }}
          ADMIN_DROP_MERGE_OUTCOME: ${{ steps.merge-admin-drop-report.outcome }}
        run: node ./scripts/send-admin-drop-slack-report.js
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 3
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 3

                  `Workers: ${{ needs.plan.outputs.bypass_workers }}`,
                  `Place orders: ${{ needs.plan.outputs.place_orders }}`,
                  '',
                  `${process.env.ARTILLERY_SLACK_SUMMARY || 'Artillery stats unavailable'}`,

    runs-on: ubuntu-latest
    environment: ${{ needs.plan.outputs.env }}
    timeout-minutes: 240
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    permissions:
      contents: read

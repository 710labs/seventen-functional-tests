          echo "ARTILLERY_REPORT_JSON=$REPORT_PATH" >> "$GITHUB_ENV"
          echo "path=$REPORT_PATH" >> "$GITHUB_OUTPUT"

      - name: Execute bypass browsers on AWS Fargate
        uses: artilleryio/action-cli@v1
        with:
          command: run-fargate --region ${{ secrets.S3_REGION }} --count ${{ needs.plan.outputs.bypass_workers }} --cpu 4 --memory 8 ${{ needs.plan.outputs.fargate_spot_flag }} --dotenv ${{ steps.prepare_artillery.outputs.dotenv }} --packages loadtest/package.json ${{ steps.prepare_artillery.outputs.config }} --output ${{ steps.artillery_report.outputs.path }} --record --key ${{ secrets.ARTILLERY_REPORT_APIKEY }} --tags name:${{ needs.plan.outputs.env }}/drop-simulation/${{ needs.plan.outputs.mode }}/bypass/${{ needs.plan.outputs.bypass_browsers }}browsers/${{ needs.plan.outputs.bypass_workers }}workers/gate-${{ needs.plan.outputs.gate_tag }}/orders-${{ needs.plan.outputs.place_orders }}/${{ needs.plan.outputs.fargate_capacity }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Summarize Artillery report
        if: always()
        run: node scripts/summarize-artillery-report.js "$ARTILLERY_REPORT_JSON"

      - name: Check thresholds
        if: always()
        run: node loadtest/scripts/check-thresholds.js --report "$ARTILLERY_REPORT_JSON" --max-vusers-failed 0 --optional


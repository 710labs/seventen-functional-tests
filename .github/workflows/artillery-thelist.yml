name: Load Tests - The List
on:
  workflow_dispatch:
    inputs:
      env:
        type: choice
        description: 'Environment (prod intentionally excluded to avoid production load tests)'
        required: true
        options:
          - dev
          - stage
      load_pattern:
        type: choice
        description: 'Load pattern'
        required: true
        default: concurrent_burst
        options:
          - concurrent_burst
          - total_spread
      load_size:
        type: choice
        description: 'Users'
        required: true
        default: '1'
        options:
          - '1'
          - '5'
          - '10'
          - '25'
          - '50'
          - '75'
          - '100'
          - '150'
          - '200'
jobs:
  artillery:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'

      - name: Resolve load preset
        id: resolve_load_preset
        run: |
          set -euo pipefail
          ARTILLERY_ENV="${{ github.event.inputs.env }}"
          ARTILLERY_LOAD_PATTERN="${{ github.event.inputs.load_pattern }}"
          ARTILLERY_LOAD_SIZE="${{ github.event.inputs.load_size }}"
          ARTILLERY_710_MODE=ca
          ARTILLERY_CART_ITEM_COUNT=6
          ARTILLERY_FARGATE_CAPACITY=on_demand

          case "$ARTILLERY_ENV" in
            dev)
              ARTILLERY_TARGET="https://thelist-dev.710labs.com"
              ;;
            stage)
              ARTILLERY_TARGET="https://thelist-stage.710labs.com"
              ;;
            *)
              echo "Unsupported env: $ARTILLERY_ENV" >&2
              exit 1
              ;;
          esac

          case "$ARTILLERY_LOAD_PATTERN:$ARTILLERY_LOAD_SIZE" in
            concurrent_burst:1)
              ARTILLERY_PACING_MODE=rate
              ARTILLERY_VIRTUAL_USERS=1
              ARTILLERY_ARRIVAL_RATE=1
              ARTILLERY_ARRIVAL_COUNT=1
              ARTILLERY_DURATION=1
              ARTILLERY_FARGATE_WORKERS=1
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            concurrent_burst:5)
              ARTILLERY_PACING_MODE=rate
              ARTILLERY_VIRTUAL_USERS=5
              ARTILLERY_ARRIVAL_RATE=5
              ARTILLERY_ARRIVAL_COUNT=5
              ARTILLERY_DURATION=1
              ARTILLERY_FARGATE_WORKERS=1
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            concurrent_burst:10)
              ARTILLERY_PACING_MODE=rate
              ARTILLERY_VIRTUAL_USERS=10
              ARTILLERY_ARRIVAL_RATE=10
              ARTILLERY_ARRIVAL_COUNT=10
              ARTILLERY_DURATION=1
              ARTILLERY_FARGATE_WORKERS=1
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            concurrent_burst:25)
              ARTILLERY_PACING_MODE=rate
              ARTILLERY_VIRTUAL_USERS=25
              ARTILLERY_ARRIVAL_RATE=25
              ARTILLERY_ARRIVAL_COUNT=25
              ARTILLERY_DURATION=1
              ARTILLERY_FARGATE_WORKERS=5
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            concurrent_burst:50)
              ARTILLERY_PACING_MODE=rate
              ARTILLERY_VIRTUAL_USERS=50
              ARTILLERY_ARRIVAL_RATE=25
              ARTILLERY_ARRIVAL_COUNT=50
              ARTILLERY_DURATION=2
              ARTILLERY_FARGATE_WORKERS=5
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            concurrent_burst:75)
              ARTILLERY_PACING_MODE=rate
              ARTILLERY_VIRTUAL_USERS=75
              ARTILLERY_ARRIVAL_RATE=25
              ARTILLERY_ARRIVAL_COUNT=75
              ARTILLERY_DURATION=3
              ARTILLERY_FARGATE_WORKERS=5
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            concurrent_burst:100)
              ARTILLERY_PACING_MODE=rate
              ARTILLERY_VIRTUAL_USERS=100
              ARTILLERY_ARRIVAL_RATE=50
              ARTILLERY_ARRIVAL_COUNT=100
              ARTILLERY_DURATION=2
              ARTILLERY_FARGATE_WORKERS=5
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            concurrent_burst:150)
              ARTILLERY_PACING_MODE=rate
              ARTILLERY_VIRTUAL_USERS=150
              ARTILLERY_ARRIVAL_RATE=50
              ARTILLERY_ARRIVAL_COUNT=150
              ARTILLERY_DURATION=3
              ARTILLERY_FARGATE_WORKERS=10
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            concurrent_burst:200)
              ARTILLERY_PACING_MODE=rate
              ARTILLERY_VIRTUAL_USERS=200
              ARTILLERY_ARRIVAL_RATE=100
              ARTILLERY_ARRIVAL_COUNT=200
              ARTILLERY_DURATION=2
              ARTILLERY_FARGATE_WORKERS=10
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            total_spread:1)
              ARTILLERY_PACING_MODE=even_spacing
              ARTILLERY_VIRTUAL_USERS=1
              ARTILLERY_ARRIVAL_RATE=1
              ARTILLERY_ARRIVAL_COUNT=1
              ARTILLERY_DURATION=60
              ARTILLERY_FARGATE_WORKERS=1
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            total_spread:5)
              ARTILLERY_PACING_MODE=even_spacing
              ARTILLERY_VIRTUAL_USERS=5
              ARTILLERY_ARRIVAL_RATE=5
              ARTILLERY_ARRIVAL_COUNT=5
              ARTILLERY_DURATION=120
              ARTILLERY_FARGATE_WORKERS=1
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            total_spread:10)
              ARTILLERY_PACING_MODE=even_spacing
              ARTILLERY_VIRTUAL_USERS=10
              ARTILLERY_ARRIVAL_RATE=10
              ARTILLERY_ARRIVAL_COUNT=10
              ARTILLERY_DURATION=180
              ARTILLERY_FARGATE_WORKERS=1
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            total_spread:25)
              ARTILLERY_PACING_MODE=even_spacing
              ARTILLERY_VIRTUAL_USERS=25
              ARTILLERY_ARRIVAL_RATE=25
              ARTILLERY_ARRIVAL_COUNT=25
              ARTILLERY_DURATION=300
              ARTILLERY_FARGATE_WORKERS=1
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            total_spread:50)
              ARTILLERY_PACING_MODE=even_spacing
              ARTILLERY_VIRTUAL_USERS=50
              ARTILLERY_ARRIVAL_RATE=50
              ARTILLERY_ARRIVAL_COUNT=50
              ARTILLERY_DURATION=300
              ARTILLERY_FARGATE_WORKERS=1
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            total_spread:75)
              ARTILLERY_PACING_MODE=even_spacing
              ARTILLERY_VIRTUAL_USERS=75
              ARTILLERY_ARRIVAL_RATE=75
              ARTILLERY_ARRIVAL_COUNT=75
              ARTILLERY_DURATION=420
              ARTILLERY_FARGATE_WORKERS=1
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            total_spread:100)
              ARTILLERY_PACING_MODE=even_spacing
              ARTILLERY_VIRTUAL_USERS=100
              ARTILLERY_ARRIVAL_RATE=100
              ARTILLERY_ARRIVAL_COUNT=100
              ARTILLERY_DURATION=600
              ARTILLERY_FARGATE_WORKERS=1
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            total_spread:150)
              ARTILLERY_PACING_MODE=even_spacing
              ARTILLERY_VIRTUAL_USERS=150
              ARTILLERY_ARRIVAL_RATE=150
              ARTILLERY_ARRIVAL_COUNT=150
              ARTILLERY_DURATION=900
              ARTILLERY_FARGATE_WORKERS=1
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            total_spread:200)
              ARTILLERY_PACING_MODE=even_spacing
              ARTILLERY_VIRTUAL_USERS=200
              ARTILLERY_ARRIVAL_RATE=200
              ARTILLERY_ARRIVAL_COUNT=200
              ARTILLERY_DURATION=1200
              ARTILLERY_FARGATE_WORKERS=1
              ARTILLERY_FARGATE_CPU=4
              ARTILLERY_FARGATE_MEMORY=8
              ;;
            *)
              echo "Unsupported load preset: ${ARTILLERY_LOAD_PATTERN}:${ARTILLERY_LOAD_SIZE}" >&2
              exit 1
              ;;
          esac

          ARTILLERY_EFFECTIVE_VIRTUAL_USERS=$ARTILLERY_VIRTUAL_USERS
          ARTILLERY_EFFECTIVE_ARRIVAL_RATE=$ARTILLERY_ARRIVAL_RATE

          if [ "$ARTILLERY_FARGATE_WORKERS" -gt 1 ]; then
            if [ "$ARTILLERY_PACING_MODE" != "rate" ]; then
              echo "Only rate presets may use multiple Fargate workers." >&2
              exit 1
            fi

            if [ $((ARTILLERY_VIRTUAL_USERS % ARTILLERY_FARGATE_WORKERS)) -ne 0 ]; then
              echo "Preset virtual_users ($ARTILLERY_VIRTUAL_USERS) must divide evenly by workers ($ARTILLERY_FARGATE_WORKERS)." >&2
              exit 1
            fi

            if [ $((ARTILLERY_ARRIVAL_RATE % ARTILLERY_FARGATE_WORKERS)) -ne 0 ]; then
              echo "Preset arrival_rate ($ARTILLERY_ARRIVAL_RATE) must divide evenly by workers ($ARTILLERY_FARGATE_WORKERS)." >&2
              exit 1
            fi

            ARTILLERY_EFFECTIVE_VIRTUAL_USERS=$((ARTILLERY_VIRTUAL_USERS / ARTILLERY_FARGATE_WORKERS))
            ARTILLERY_EFFECTIVE_ARRIVAL_RATE=$((ARTILLERY_ARRIVAL_RATE / ARTILLERY_FARGATE_WORKERS))
          fi

          if [ "$ARTILLERY_PACING_MODE" = "rate" ]; then
            ARTILLERY_TOTAL_TOPOLOGY_TAG="total-${ARTILLERY_VIRTUAL_USERS}vu-${ARTILLERY_ARRIVAL_RATE}rps"
            ARTILLERY_PER_WORKER_TOPOLOGY_TAG="per-worker-${ARTILLERY_EFFECTIVE_VIRTUAL_USERS}vu-${ARTILLERY_EFFECTIVE_ARRIVAL_RATE}rps"
          else
            ARTILLERY_TOTAL_TOPOLOGY_TAG="total-${ARTILLERY_VIRTUAL_USERS}vu-${ARTILLERY_ARRIVAL_COUNT}count"
            ARTILLERY_PER_WORKER_TOPOLOGY_TAG="per-worker-${ARTILLERY_EFFECTIVE_VIRTUAL_USERS}vu"
          fi

          {
            echo "ARTILLERY_TARGET=$ARTILLERY_TARGET"
            echo "ARTILLERY_ENV=$ARTILLERY_ENV"
            echo "ARTILLERY_LOAD_PATTERN=$ARTILLERY_LOAD_PATTERN"
            echo "ARTILLERY_LOAD_SIZE=$ARTILLERY_LOAD_SIZE"
            echo "ARTILLERY_710_MODE=$ARTILLERY_710_MODE"
            echo "ARTILLERY_PACING_MODE=$ARTILLERY_PACING_MODE"
            echo "ARTILLERY_VIRTUAL_USERS=$ARTILLERY_VIRTUAL_USERS"
            echo "ARTILLERY_ARRIVAL_RATE=$ARTILLERY_ARRIVAL_RATE"
            echo "ARTILLERY_ARRIVAL_COUNT=$ARTILLERY_ARRIVAL_COUNT"
            echo "ARTILLERY_DURATION=$ARTILLERY_DURATION"
            echo "ARTILLERY_CART_ITEM_COUNT=$ARTILLERY_CART_ITEM_COUNT"
            echo "ARTILLERY_FARGATE_WORKERS=$ARTILLERY_FARGATE_WORKERS"
            echo "ARTILLERY_FARGATE_CPU=$ARTILLERY_FARGATE_CPU"
            echo "ARTILLERY_FARGATE_MEMORY=$ARTILLERY_FARGATE_MEMORY"
            echo "ARTILLERY_FARGATE_CAPACITY=$ARTILLERY_FARGATE_CAPACITY"
            echo "ARTILLERY_EFFECTIVE_VIRTUAL_USERS=$ARTILLERY_EFFECTIVE_VIRTUAL_USERS"
            echo "ARTILLERY_EFFECTIVE_ARRIVAL_RATE=$ARTILLERY_EFFECTIVE_ARRIVAL_RATE"
            echo "ARTILLERY_TOTAL_TOPOLOGY_TAG=$ARTILLERY_TOTAL_TOPOLOGY_TAG"
            echo "ARTILLERY_PER_WORKER_TOPOLOGY_TAG=$ARTILLERY_PER_WORKER_TOPOLOGY_TAG"
          } >> "$GITHUB_ENV"

          {
            echo "target=$ARTILLERY_TARGET"
            echo "env=$ARTILLERY_ENV"
            echo "load_pattern=$ARTILLERY_LOAD_PATTERN"
            echo "load_size=$ARTILLERY_LOAD_SIZE"
            echo "mode=$ARTILLERY_710_MODE"
            echo "pacing_mode=$ARTILLERY_PACING_MODE"
            echo "virtual_users=$ARTILLERY_VIRTUAL_USERS"
            echo "arrival_rate=$ARTILLERY_ARRIVAL_RATE"
            echo "arrival_count=$ARTILLERY_ARRIVAL_COUNT"
            echo "duration=$ARTILLERY_DURATION"
            echo "cart_item_count=$ARTILLERY_CART_ITEM_COUNT"
            echo "fargate_workers=$ARTILLERY_FARGATE_WORKERS"
            echo "fargate_cpu=$ARTILLERY_FARGATE_CPU"
            echo "fargate_memory=$ARTILLERY_FARGATE_MEMORY"
            echo "fargate_capacity=$ARTILLERY_FARGATE_CAPACITY"
            echo "effective_virtual_users=$ARTILLERY_EFFECTIVE_VIRTUAL_USERS"
            echo "effective_arrival_rate=$ARTILLERY_EFFECTIVE_ARRIVAL_RATE"
            echo "total_topology_tag=$ARTILLERY_TOTAL_TOPOLOGY_TAG"
            echo "per_worker_topology_tag=$ARTILLERY_PER_WORKER_TOPOLOGY_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Show derived load topology
        run: |
          echo "Environment: $ARTILLERY_ENV"
          echo "Target: $ARTILLERY_TARGET"
          echo "Load preset: $ARTILLERY_LOAD_PATTERN / $ARTILLERY_LOAD_SIZE users"
          echo "Cluster totals: maxVusers=$ARTILLERY_VIRTUAL_USERS workers=$ARTILLERY_FARGATE_WORKERS pacing_mode=$ARTILLERY_PACING_MODE duration=$ARTILLERY_DURATION"
          echo "Cart items per user: $ARTILLERY_CART_ITEM_COUNT"
          if [ "$ARTILLERY_PACING_MODE" = "rate" ]; then
            echo "Cluster arrival rate: $ARTILLERY_ARRIVAL_RATE users/sec"
            echo "Per-worker topology: maxVusers=$ARTILLERY_EFFECTIVE_VIRTUAL_USERS arrivalRate=$ARTILLERY_EFFECTIVE_ARRIVAL_RATE"
          else
            echo "Cluster arrival count: $ARTILLERY_ARRIVAL_COUNT users across duration"
            echo "Per-worker topology: maxVusers=$ARTILLERY_EFFECTIVE_VIRTUAL_USERS"
          fi

      - name: Prepare Artillery Config Copy
        id: prepare_artillery_config
        run: |
          TMP_CONFIG="artillery/artillery-ca.generated.yml"

          cp artillery/artillery-ca-single-phase.yml "$TMP_CONFIG"
          sed -i "s/duration: 900/duration: $ARTILLERY_DURATION/g" "$TMP_CONFIG"
          sed -i "s/maxVusers: 10/maxVusers: $ARTILLERY_EFFECTIVE_VIRTUAL_USERS/g" "$TMP_CONFIG"
          sed -i "s|target:.*|target: $ARTILLERY_TARGET|g" "$TMP_CONFIG"

          if [ "$ARTILLERY_PACING_MODE" = "even_spacing" ]; then
            sed -i '/arrivalCount:/d' "$TMP_CONFIG"
            sed -i "s/arrivalRate: 1/arrivalCount: $ARTILLERY_ARRIVAL_COUNT/g" "$TMP_CONFIG"
          else
            sed -i '/arrivalCount:/d' "$TMP_CONFIG"
            sed -i "s/arrivalRate: 1/arrivalRate: $ARTILLERY_EFFECTIVE_ARRIVAL_RATE/g" "$TMP_CONFIG"
          fi

          echo "ARTILLERY_CONFIG=$TMP_CONFIG" >> "$GITHUB_ENV"
          echo "config=$TMP_CONFIG" >> "$GITHUB_OUTPUT"

      - name: Show generated Artillery phase
        run: |
          pwd
          ls -la artillery
          sed -n '1,20p' "$ARTILLERY_CONFIG"

      - name: Verify Artillery dependencies
        run: |
          test -f "$ARTILLERY_CONFIG"
          test -f artillery/qa-cookies.js
          test -f artillery/artillery-scripts.js
          test -f artillery/CA-DL.jpg
          test -f artillery/Medical-Card.png

      - name: Verify required secrets
        env:
          ARTILLERY_LIST_PASSWORD: ${{ secrets.ARTILLERY_LIST_PASSWORD }}
          RECAPTCHA_BYPASS: ${{ secrets.RECAPTCHA_BYPASS }}
        run: |
          if [ -z "$ARTILLERY_LIST_PASSWORD" ]; then
            echo "Missing required secret: ARTILLERY_LIST_PASSWORD for environment '${{ github.event.inputs.env }}'" >&2
            exit 1
          fi
          if [ -z "$RECAPTCHA_BYPASS" ]; then
            echo "Missing required secret: RECAPTCHA_BYPASS for environment '${{ github.event.inputs.env }}'" >&2
            exit 1
          fi

      - name: Create Fargate worker dotenv
        env:
          ARTILLERY_LIST_PASSWORD: ${{ secrets.ARTILLERY_LIST_PASSWORD }}
          RECAPTCHA_BYPASS: ${{ secrets.RECAPTCHA_BYPASS }}
        run: |
          cat > artillery/artillery.fargate.env <<EOF
          ARTILLERY_LIST_PASSWORD=$ARTILLERY_LIST_PASSWORD
          RECAPTCHA_BYPASS=$RECAPTCHA_BYPASS
          ARTILLERY_TARGET=$ARTILLERY_TARGET
          ARTILLERY_CART_ITEM_COUNT=$ARTILLERY_CART_ITEM_COUNT
          EOF

      - name: Verify Fargate worker dotenv
        run: |
          test -f artillery/artillery.fargate.env

      - name: Prepare Artillery report path
        id: artillery_report
        run: |
          mkdir -p artillery-reports
          REPORT_PATH="artillery-reports/thelist-${{ github.run_id }}.json"
          echo "ARTILLERY_REPORT_JSON=$REPORT_PATH" >> "$GITHUB_ENV"
          echo "path=$REPORT_PATH" >> "$GITHUB_OUTPUT"

      - name: Execute load tests on AWS
        uses: artilleryio/action-cli@v1
        with:
          command: run-fargate --region ${{ secrets.S3_REGION }} --count ${{ steps.resolve_load_preset.outputs.fargate_workers }} --cpu ${{ steps.resolve_load_preset.outputs.fargate_cpu }} --memory ${{ steps.resolve_load_preset.outputs.fargate_memory }} --dotenv artillery/artillery.fargate.env ${{ steps.prepare_artillery_config.outputs.config }} --output ${{ steps.artillery_report.outputs.path }} --record --key ${{ secrets.ARTILLERY_REPORT_APIKEY }} --tags name:${{ steps.resolve_load_preset.outputs.env }}/${{ steps.resolve_load_preset.outputs.load_pattern }}/preset-${{ steps.resolve_load_preset.outputs.load_size }}/${{ steps.resolve_load_preset.outputs.total_topology_tag }}/${{ steps.resolve_load_preset.outputs.per_worker_topology_tag }}/${{ steps.resolve_load_preset.outputs.duration }}seconds/${{ steps.resolve_load_preset.outputs.fargate_workers }}workers/${{ steps.resolve_load_preset.outputs.fargate_cpu }}cpu-${{ steps.resolve_load_preset.outputs.fargate_memory }}gb/${{ steps.resolve_load_preset.outputs.fargate_capacity }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ARTILLERY_TARGET: ${{ steps.resolve_load_preset.outputs.target }}
          ARTILLERY_VIRTUAL_USERS: ${{ steps.resolve_load_preset.outputs.virtual_users }}
          ARTILLERY_ARRIVAL_RATE: ${{ steps.resolve_load_preset.outputs.arrival_rate }}
          ARTILLERY_ARRIVAL_COUNT: ${{ steps.resolve_load_preset.outputs.arrival_count }}
          ARTILLERY_DURATION: ${{ steps.resolve_load_preset.outputs.duration }}
          ARTILLERY_CART_ITEM_COUNT: ${{ steps.resolve_load_preset.outputs.cart_item_count }}
          ARTILLERY_FARGATE_WORKERS: ${{ steps.resolve_load_preset.outputs.fargate_workers }}
          ARTILLERY_FARGATE_CPU: ${{ steps.resolve_load_preset.outputs.fargate_cpu }}
          ARTILLERY_FARGATE_MEMORY: ${{ steps.resolve_load_preset.outputs.fargate_memory }}
          ARTILLERY_FARGATE_CAPACITY: ${{ steps.resolve_load_preset.outputs.fargate_capacity }}
          ARTILLERY_710_MODE: ${{ steps.resolve_load_preset.outputs.mode }}
          ARTILLERY_LIST_PASSWORD: ${{ secrets.ARTILLERY_LIST_PASSWORD }}
          RECAPTCHA_BYPASS: ${{ secrets.RECAPTCHA_BYPASS }}
          ARTILLERY_EFFECTIVE_VIRTUAL_USERS: ${{ steps.resolve_load_preset.outputs.effective_virtual_users }}
          ARTILLERY_EFFECTIVE_ARRIVAL_RATE: ${{ steps.resolve_load_preset.outputs.effective_arrival_rate }}

      - name: Summarize Artillery report
        if: always()
        run: node scripts/summarize-artillery-report.js "$ARTILLERY_REPORT_JSON"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: artillery-report
          path: artillery-reports
          if-no-files-found: ignore

      - name: Slack notifications
        uses: 8398a7/action-slack@v3.15.1
        with:
          status: custom
          fields: workflow,job,commit,repo,ref,author,took
          custom_payload: |
            {
              attachments: [{
                color: '${{ job.status }}' === 'success' ? 'good' : '${{ job.status }}' === 'failure' ? 'danger' : 'warning',
                title: 'Artillery Load Test - The List',
                text: [
                  `Status: ${{ job.status }}`,
                  `Environment: ${{ steps.resolve_load_preset.outputs.env }}`,
                  `Pattern: ${{ steps.resolve_load_preset.outputs.load_pattern }}`,
                  `Preset: ${{ steps.resolve_load_preset.outputs.load_size }} users`,
                  `Target: ${{ steps.resolve_load_preset.outputs.target }}`,
                  `Duration: ${{ steps.resolve_load_preset.outputs.duration }} seconds`,
                  `Workers: ${{ steps.resolve_load_preset.outputs.fargate_workers }}`,
                  `CPU/Memory: ${{ steps.resolve_load_preset.outputs.fargate_cpu }} vCPU / ${{ steps.resolve_load_preset.outputs.fargate_memory }} GB`,
                  '',
                  `${process.env.ARTILLERY_SLACK_SUMMARY || 'Artillery stats unavailable'}`,
                  '',
                  `Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
                ].join('\n'),
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()

name: Load Tests - Live Dev
on:
  workflow_dispatch:
    inputs:
      target:
        type: choice
        description: 'Url'
        required: true
        options:
          - https://live-dev.710labs.com
      env:
        type: choice
        description: 'Environment'
        required: true
        options:
          - dev
      virtual_users:
        description: 'Max Concurrent Users (maxVusers)'
        required: false
        default: '1'
      arrival_rate:
        description: 'New users per second (arrivalRate)'
        required: false
        default: '1'
      duration:
        description: 'Duration (seconds)'
        required: true
        default: '60'

jobs:
  artillery:
    runs-on: ubuntu-latest
    environment: live-dev

    permissions:
      contents: read
      id-token: write

    env:
      ARTILLERY_TARGET: ${{ github.event.inputs.target }}
      ARTILLERY_ENV: ${{ github.event.inputs.env }}
      ARTILLERY_REGISTRATION_PASSWORD: ${{ secrets.ALWAYS_ON_PASSWORD }}
      ARTILLERY_REPORT_APIKEY: ${{ secrets.ARTILLERY_REPORT_APIKEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Artillery config copy
        run: |
          TMP_CONFIG=$(mktemp /tmp/artillery-live-dev.XXXXXX.yml)
          cp artillery/artillery-live-dev.yml "$TMP_CONFIG"
          sed -i.bak "s/duration: 60/duration: ${{ github.event.inputs.duration }}/" "$TMP_CONFIG"
          sed -i.bak "s/arrivalRate: 1/arrivalRate: ${{ github.event.inputs.arrival_rate }}/" "$TMP_CONFIG"
          sed -i.bak "s/maxVusers: 1/maxVusers: ${{ github.event.inputs.virtual_users }}/" "$TMP_CONFIG"
          rm -f "$TMP_CONFIG.bak"
          echo "ARTILLERY_CONFIG=$TMP_CONFIG" >> "$GITHUB_ENV"

      - name: Set current date as env variable
        run: echo "NOW=$(date +'%Y-%m-%dT%H:%M:%S')" >> "$GITHUB_ENV"

      - name: Execute live-dev load test on AWS
        uses: artilleryio/action-cli@v1
        with:
          command: run-fargate --region ${{ secrets.S3_REGION }} --count 1 ${{ env.ARTILLERY_CONFIG }} --record --key ${{ secrets.ARTILLERY_REPORT_APIKEY }} --tags name:${{ github.event.inputs.env }}/live-dev/${{ github.event.inputs.virtual_users }}VU/${{ github.event.inputs.duration }}seconds

      - name: Upload Artillery reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artillery-live-dev-report
          path: artillery-reports
          if-no-files-found: ignore

      - name: Notify about failures
        if: failure()
        uses: 8398a7/action-slack@v3.15.1
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,eventName,job,took,pullRequest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack notifications
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: workflow,job,commit,repo,ref,author,took
          custom_payload: |
            {
              attachments: [{
                color: '${{ job.status }}' === 'success' ? 'good' : '${{ job.status }}' === 'failure' ? 'danger' : 'warning',
                text: `${process.env.AS_WORKFLOW}\n${process.env.AS_JOB} (${process.env.AS_COMMIT}) of ${process.env.AS_REPO}@${process.env.AS_REF} by ${process.env.AS_AUTHOR} ${{ job.status }} in ${process.env.AS_TOOK}`,
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

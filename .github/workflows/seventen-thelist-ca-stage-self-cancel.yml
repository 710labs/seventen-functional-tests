name: List - CA - Stage - Self-Cancel POC
on: workflow_dispatch
concurrency:
  group: thelist-stage-domain-state
  cancel-in-progress: false

jobs:
  smoke:
    name: Smoke Tests (Stage CA)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ENV: stage-ca thelist-stage.710labs.com
      ENV_ID: stage-ca
      EXECUTION_TYPE: ${{ github.event_name == 'workflow_dispatch' && 'Manual Run' || 'Scheduled Run' }}
      ADMIN_USER: ${{ secrets.ADMIN_USER }}
      ADMIN_PW: ${{ secrets.ADMIN_PW }}
      CHECKOUT_PASSWORD: ${{ secrets.CHECKOUT_PASSWORD }}
      RECAPTCHA_BYPASS: ${{ secrets.RECAPTCHA_BYPASS }}
      API_KEY: ${{ secrets.API_KEY }}
      BASE_URL: ${{ secrets.BASE_URL_STAGE }}
      QA_ENDPOINT: /wp-json/seventen-qa/v1/
      BYPASS_TAX_CALC: true
      NEXT_VERSION: true
      SLACK_BOT_USER_OAUTH_TOKEN: ${{ secrets.PW_TESTS_SLACKBOT_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET: ${{ secrets.S3_SECRET }}
      S3_REGION: ${{ secrets.S3_REGION }}

    # expose the order-id and split-order-id out to downstream jobs
    outputs:
      order-id: ${{ steps.extract.outputs.orderID }}
      order_ids_json: ${{ steps.extract.outputs.order_ids_json }}
      split-order-id: ${{ steps.extract-split.outputs.splitOrderID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'
      - name: Install dependencies
        timeout-minutes: 15
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --no-audit --no-fund --fetch-timeout=600000 --fetch-retries=5
      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Playwright smoke tests
        id: smoke_test
        run: npm run smoke:test:dev:ca
        # <-- no continue-on-error here so failures are marked
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
      - name: Read order_ids.txt
        if: always()
        id: extract
        run: |
          if [[ -f order_ids.txt ]]; then
            tr -d '\r' < order_ids.txt | sed '/^[[:space:]]*$/d' | sort -u > /tmp/order_ids_flat.txt
          elif [[ -f order_id.txt ]]; then
            tr -d '\r' < order_id.txt | sed '/^[[:space:]]*$/d' | sort -u > /tmp/order_ids_flat.txt
          else
            : > /tmp/order_ids_flat.txt
          fi

          if [[ -s /tmp/order_ids_flat.txt ]]; then
            ORDER_ID=$(head -n 1 /tmp/order_ids_flat.txt)
            COUNT=$(wc -l < /tmp/order_ids_flat.txt | tr -d ' ')
            echo "Found $COUNT Order ID(s):"
            cat /tmp/order_ids_flat.txt
            JSON=$(node -e "const fs=require('fs'); const ids=fs.readFileSync('/tmp/order_ids_flat.txt','utf8').split(/\r?\n/).filter(Boolean); process.stdout.write(JSON.stringify(ids));")
            echo "orderID=$ORDER_ID" >> "$GITHUB_OUTPUT"
            echo "order_ids_json=$JSON" >> "$GITHUB_OUTPUT"
          else
            echo "order_ids.txt not found; setting empty order outputs"
            echo "orderID=" >> "$GITHUB_OUTPUT"
            echo "order_ids_json=[]" >> "$GITHUB_OUTPUT"
          fi
      - name: Read split_order_id.txt
        if: always()
        id: extract-split
        run: |
          if [[ -f split_order_id.txt ]]; then
            SPLIT_ORDER_ID=$(<split_order_id.txt)
            echo "✅ Found Split Order ID: $SPLIT_ORDER_ID"
            echo "splitOrderID=$SPLIT_ORDER_ID" >> $GITHUB_OUTPUT
          else
            echo "⚠️  split_order_id.txt not found; setting empty splitOrderID"
            # still emit the output key, just blank
            echo "splitOrderID=" >> $GITHUB_OUTPUT
          fi
  cleanup:
    name: Cleanup Cancel Test Order
    needs: smoke
    runs-on: ubuntu-latest
    # always run this job, even if `smoke` failed
    if: always()
    env:
      WC_CONSUMER_KEY: ${{ secrets.WOO_STAGE_KEY }}
      WC_CONSUMER_SECRET: ${{ secrets.WOO_STAGE_SECRET }}
      BASE_URL: ${{ secrets.BASE_URL_STAGE }}

    steps:
      - name: Cancel test order via WooCommerce API
        # only call if we actually got an ID
        if: ${{ needs.smoke.outputs.order_ids_json != '' && needs.smoke.outputs.order_ids_json != '[]' }}
        env:
          ORDER_IDS_JSON: ${{ needs.smoke.outputs.order_ids_json }}
        run: |
          node -e "JSON.parse(process.env.ORDER_IDS_JSON).forEach(id => console.log(id))" > /tmp/order_ids_to_cancel.txt
          while IFS= read -r ORDER_ID; do
            [ -n "$ORDER_ID" ] || continue
            echo "Cancelling order ${ORDER_ID}..."
            curl -X PUT "${BASE_URL}/wp-json/wc/v3/orders/${ORDER_ID}" \
              -u "${WC_CONSUMER_KEY}:${WC_CONSUMER_SECRET}" \
              -H "Content-Type: application/json" \
              -d '{"status":"cancelled"}'
          done < /tmp/order_ids_to_cancel.txt
      - name: Cancel split order via WooCommerce API
        # only call if we actually got an ID
        if: ${{ needs.smoke.outputs.split-order-id != '' }}
        run: |
          echo "🛠 Cancelling split order ${{ needs.smoke.outputs.split-order-id }}…"
          curl -X PUT "${BASE_URL}/wp-json/wc/v3/orders/${{ needs.smoke.outputs.split-order-id }}" \
            -u "${WC_CONSUMER_KEY}:${WC_CONSUMER_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"status":"cancelled"}'

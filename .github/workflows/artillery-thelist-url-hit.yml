name: Load Tests - The List URL Hit
on:
  workflow_dispatch:
    inputs:
      target:
        type: choice
        description: 'Url'
        required: true
        options:
          - https://thelist-dev.710labs.com
          - https://thelist-stage.710labs.com
      env:
        type: choice
        description: 'Environment'
        required: true
        options:
          - dev
          - stage
      virtual_users:
        description: 'Max Concurrent Users (maxVusers)'
        required: false
        default: '1'
      arrival_rate:
        description: 'New users per second (arrivalRate)'
        required: false
        default: '1'
      duration:
        description: 'Duration (seconds)'
        required: true
        default: '60'
concurrency:
  group: thelist-${{ github.event.inputs.env }}-domain-state
  cancel-in-progress: false
jobs:
  artillery:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env }}

    permissions:
      contents: read
      id-token: write

    env:
      ARTILLERY_TARGET: ${{ github.event.inputs.target }}
      ARTILLERY_ENV: ${{ github.event.inputs.env }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'

      - name: Validate dev/stage target
        run: |
          case "$ARTILLERY_ENV" in
            dev)
              EXPECTED_TARGET="https://thelist-dev.710labs.com"
              ;;
            stage)
              EXPECTED_TARGET="https://thelist-stage.710labs.com"
              ;;
            *)
              echo "Unsupported env for URL-hit Artillery run: $ARTILLERY_ENV" >&2
              exit 1
              ;;
          esac

          if [ "$ARTILLERY_TARGET" != "$EXPECTED_TARGET" ]; then
            echo "Target $ARTILLERY_TARGET does not match env $ARTILLERY_ENV. Expected $EXPECTED_TARGET." >&2
            exit 1
          fi

      - name: Set Domain to CA
        env:
          API_KEY: ${{ secrets.API_KEY }}
          QA_ENDPOINT: /wp-json/seventen-qa/v1/
        run: |
          if [ -z "$API_KEY" ]; then
            echo "Missing required secret: API_KEY for environment '${{ github.event.inputs.env }}'" >&2
            exit 1
          fi

          BASE_URL="$ARTILLERY_TARGET" node ./scripts/set-qa-domain.js ca

      - name: Prepare Artillery config copy
        run: |
          TMP_CONFIG=artillery/artillery-thelist-url-hit.generated.yml
          cp artillery/artillery-thelist-url-hit.yml "$TMP_CONFIG"
          sed -i.bak "s/duration: 60/duration: ${{ github.event.inputs.duration }}/" "$TMP_CONFIG"
          sed -i.bak "s/arrivalRate: 1/arrivalRate: ${{ github.event.inputs.arrival_rate }}/" "$TMP_CONFIG"
          sed -i.bak "s/maxVusers: 1/maxVusers: ${{ github.event.inputs.virtual_users }}/" "$TMP_CONFIG"
          rm -f "$TMP_CONFIG.bak"
          echo "ARTILLERY_CONFIG=$TMP_CONFIG" >> "$GITHUB_ENV"

      - name: Show generated Artillery config
        run: |
          pwd
          ls -la artillery
          sed -n '1,20p' "$ARTILLERY_CONFIG"

      - name: Verify Artillery dependencies
        run: |
          test -f "$ARTILLERY_CONFIG"
          test -f artillery/qa-cookies.js
          test -f artillery/artillery-thelist-url-hit-scripts.js

      - name: Verify required secrets
        env:
          RECAPTCHA_BYPASS: ${{ secrets.RECAPTCHA_BYPASS }}
        run: |
          if [ -z "$RECAPTCHA_BYPASS" ]; then
            echo "Missing required secret: RECAPTCHA_BYPASS for environment '${{ github.event.inputs.env }}'" >&2
            exit 1
          fi

      - name: Create Fargate worker dotenv
        env:
          RECAPTCHA_BYPASS: ${{ secrets.RECAPTCHA_BYPASS }}
        run: |
          cat > artillery/artillery-thelist-url-hit.fargate.env <<EOF
          RECAPTCHA_BYPASS=$RECAPTCHA_BYPASS
          ARTILLERY_TARGET=$ARTILLERY_TARGET
          EOF

      - name: Verify Fargate worker dotenv
        run: |
          test -f artillery/artillery-thelist-url-hit.fargate.env

      - name: Execute load tests on AWS
        uses: artilleryio/action-cli@v1
        with:
          command: run-fargate --region ${{ secrets.S3_REGION }} --count 1 --dotenv artillery/artillery-thelist-url-hit.fargate.env ${{ env.ARTILLERY_CONFIG }} --record --key ${{ secrets.ARTILLERY_REPORT_APIKEY }} --tags name:${{ github.event.inputs.env }}/thelist-url-hit/${{ github.event.inputs.virtual_users }}VU/${{ github.event.inputs.duration }}seconds
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          RECAPTCHA_BYPASS: ${{ secrets.RECAPTCHA_BYPASS }}

      - name: Upload Artillery reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artillery-thelist-url-hit-report
          path: artillery-reports
          if-no-files-found: ignore

      - name: Slack notifications
        if: always()
        uses: 8398a7/action-slack@v3.15.1
        with:
          status: custom
          fields: workflow,job,commit,repo,ref,author,took
          custom_payload: |
            {
              attachments: [{
                color: '${{ job.status }}' === 'success' ? 'good' : '${{ job.status }}' === 'failure' ? 'danger' : 'warning',
                title: 'Artillery Load Test - URL Hit',
                text: [
                  `Status: ${{ job.status }}`,
                  `Environment: ${{ github.event.inputs.env }}`,
                  `Target: ${{ github.event.inputs.target }}`,
                  `Max VUs: ${{ github.event.inputs.virtual_users || '1' }}`,
                  `Arrival rate: ${{ github.event.inputs.arrival_rate || '1' }}`,
                  `Duration: ${{ github.event.inputs.duration }} seconds`,
                  `Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
                ].join('\n'),
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

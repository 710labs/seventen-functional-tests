name: Acuity Slot Automation - In Progress
on:
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        description: Validate the selected CSV only, or upload slots to Acuity.
        required: true
        default: validate_only
        options:
          - validate_only
          - upload
      slot_file:
        type: string
        description: Committed CSV path under utils/. Ignored when slot_file_url is set.
        required: false
        default: utils/delivery-slots.csv
      slot_file_url:
        type: string
        description: Optional direct HTTPS raw CSV URL. Use only for emergency runs.
        required: false
        default: ''
      workers:
        type: choice
        description: Playwright workers for upload mode. Values above 1 require ACUITY_STORAGE_STATE_B64.
        required: true
        default: '3'
        options:
          - '1'
          - '2'
          - '3'
          - '4'
      slot_grep:
        type: string
        description: Optional regex to target a specific slot after Acuity Automation.
        required: false
        default: ''
concurrency:
  group: acuity-slot-automation
  cancel-in-progress: false
jobs:
  acuity-slot-automation:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      ADMIN_USER: ${{ secrets.ADMIN_USER }}
      ADMIN_PW: ${{ secrets.ADMIN_PW }}
      CHECKOUT_PASSWORD: ${{ secrets.CHECKOUT_PASSWORD }}
      RECAPTCHA_BYPASS: ${{ secrets.RECAPTCHA_BYPASS }}
      API_KEY: ${{ secrets.API_KEY }}
      BASE_URL: ${{ secrets.BASE_URL_DEV }}
      QA_ENDPOINT: /wp-content/plugins/seventen-qa/api/
      BYPASS_TAX_CALC: true
      ACUITY_USER: ${{ secrets.ACUITY_USER }}
      ACUITY_PASSWORD: ${{ secrets.ACUITY_PASSWORD }}
      ACUITY_STORAGE_STATE_B64: ${{ secrets.ACUITY_STORAGE_STATE_B64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'
      - name: Install dependencies
        timeout-minutes: 15
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --no-audit --no-fund --fetch-timeout=600000 --fetch-retries=5
      - name: Prepare Acuity slot CSV
        env:
          SLOT_FILE: ${{ inputs.slot_file }}
          SLOT_FILE_URL: ${{ inputs.slot_file_url }}
        run: |
          set -euo pipefail

          selected_file=".acuity-input/selected-delivery-slots.csv"
          mkdir -p "$(dirname "$selected_file")"

          if [[ -n "$SLOT_FILE_URL" ]]; then
            case "$SLOT_FILE_URL" in
              https://*) ;;
              *)
                echo "::error::slot_file_url must be a direct HTTPS URL to raw CSV bytes."
                exit 1
                ;;
            esac

            curl --proto '=https' --tlsv1.2 --fail --location --show-error --silent \
              --retry 3 --retry-all-errors --max-time 60 \
              --output "$selected_file" "$SLOT_FILE_URL"
            echo "ACUITY_SLOT_SOURCE=$SLOT_FILE_URL" >> "$GITHUB_ENV"
          else
            SLOT_FILE="${SLOT_FILE:-utils/delivery-slots.csv}"
            case "$SLOT_FILE" in
              utils/*.csv) ;;
              *)
                echo "::error::slot_file must be a CSV file under utils/."
                exit 1
                ;;
            esac

            if [[ "$SLOT_FILE" == *".."* ]]; then
              echo "::error::slot_file must not contain path traversal."
              exit 1
            fi

            cp "$SLOT_FILE" "$selected_file"
            echo "ACUITY_SLOT_SOURCE=$SLOT_FILE" >> "$GITHUB_ENV"
          fi

          echo "ACUITY_SLOT_FILE=$selected_file" >> "$GITHUB_ENV"
      - name: Validate Acuity slot CSV
        env:
          ACUITY_NORMALIZE_SLOT_FILE: 'true'
        run: node scripts/validate-acuity-slots.js "$ACUITY_SLOT_FILE"
      - name: Upload selected Acuity CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acuity-selected-delivery-slots
          path: .acuity-input/selected-delivery-slots.csv
          if-no-files-found: ignore
      - name: Prepare Acuity auth state
        if: inputs.mode == 'upload'
        run: |
          set -euo pipefail

          if [[ -n "${ACUITY_STORAGE_STATE_B64:-}" ]]; then
            mkdir -p .auth
            printf '%s' "$ACUITY_STORAGE_STATE_B64" | base64 --decode > .auth/acuity-storage-state.json
            echo "ACUITY_STORAGE_STATE_FILE=.auth/acuity-storage-state.json" >> "$GITHUB_ENV"
            echo "Using Acuity storage state from ACUITY_STORAGE_STATE_B64."
          else
            echo "No ACUITY_STORAGE_STATE_B64 secret found; falling back to Acuity username/password login."
          fi
      - name: Verify Acuity credentials
        if: inputs.mode == 'upload'
        run: |
          set -euo pipefail

          if [[ -n "${ACUITY_STORAGE_STATE_FILE:-}" ]]; then
            echo "Acuity storage state is configured. ACUITY_USER and ACUITY_PASSWORD are fallback credentials only."
            exit 0
          fi

          missing=()
          if [[ -z "${ACUITY_USER:-}" ]]; then
            missing+=("ACUITY_USER")
          fi
          if [[ -z "${ACUITY_PASSWORD:-}" ]]; then
            missing+=("ACUITY_PASSWORD")
          fi

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required Acuity secret(s): ${missing[*]}. Add them as repository or environment secrets before running upload mode."
            exit 1
          fi
      - name: Install Playwright
        if: inputs.mode == 'upload'
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        if: inputs.mode == 'upload'
        env:
          SLOT_GREP: ${{ inputs.slot_grep }}
          WORKERS: ${{ inputs.workers }}
          ACUITY_HEADLESS: 'true'
          ACUITY_UPLOAD_CI_ARTIFACTS: 'true'
        run: |
          set -euo pipefail

          grep_pattern="Acuity Automation"
          if [[ -n "$SLOT_GREP" ]]; then
            grep_pattern="Acuity Automation.*$SLOT_GREP"
          fi

          if [[ "$WORKERS" != "1" ]]; then
            if [[ -z "${ACUITY_STORAGE_STATE_FILE:-}" ]]; then
              echo "::error::Multiple Acuity workers require ACUITY_STORAGE_STATE_B64 so workers do not run concurrent Squarespace login automation."
              exit 1
            fi

            export ACUITY_REQUIRE_STORAGE_STATE=true
          fi

          npx playwright test \
            --grep "$grep_pattern" \
            --config=configs/automation.config.ts \
            --project="Desktop Chrome" \
            --workers="$WORKERS" \
            --trace=retain-on-failure \
            --reporter=list,html
      - uses: actions/upload-artifact@v4
        if: failure() && inputs.mode == 'upload'
        with:
          name: playwright-failure-artifacts
          path: |
            playwright-report/
            test-results/
      - name: Send Slack notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          MODE: ${{ inputs.mode }}
          SLOT_FILE: ${{ inputs.slot_file }}
          SLOT_FILE_URL: ${{ inputs.slot_file_url }}
          WORKERS: ${{ inputs.workers }}
          SLOT_GREP: ${{ inputs.slot_grep }}
        run: |
          set -euo pipefail

          if [[ -z "${SLACK_WEBHOOK_URL:-}" ]]; then
            echo "::warning::SLACK_WEBHOOK_URL is not set; skipping Slack notification."
            exit 0
          fi

          node <<'NODE'
          const webhookUrl = process.env.SLACK_WEBHOOK_URL
          const status = process.env.JOB_STATUS || 'unknown'
          const statusEmoji =
            status === 'success' ? ':large_green_circle:' :
            status === 'cancelled' ? ':large_yellow_circle:' :
            ':red_circle:'
          const slotSource =
            process.env.ACUITY_SLOT_SOURCE ||
            process.env.SLOT_FILE_URL ||
            process.env.SLOT_FILE ||
            'unknown'
          const grep = process.env.SLOT_GREP || 'All rows'

          const message = {
            text: `Acuity Slot Automation ${status}`,
            blocks: [
              {
                type: 'header',
                text: {
                  type: 'plain_text',
                  text: 'Acuity Slot Automation',
                  emoji: true,
                },
              },
              {
                type: 'section',
                text: {
                  type: 'mrkdwn',
                  text: [
                    `*Status:* ${statusEmoji} ${status}`,
                    `*Mode:* ${process.env.MODE || 'unknown'}`,
                    `*CSV:* ${slotSource}`,
                    `*Workers:* ${process.env.WORKERS || 'unknown'}`,
                    `*Target:* ${grep}`,
                    `*Run:* <${process.env.RUN_URL}|${process.env.WORKFLOW_NAME || 'GitHub Actions'} #${process.env.RUN_ID || ''}>`,
                  ].join('\n'),
                },
              },
            ],
          }

          try {
            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(message),
            })

            if (!response.ok) {
              const body = await response.text().catch(() => '')
              console.log(`::warning::Slack notification failed: ${response.status} ${response.statusText} ${body}`)
              process.exit(0)
            }

            console.log('Slack notification sent.')
          } catch (error) {
            console.log(`::warning::Slack notification error: ${error instanceof Error ? error.message : String(error)}`)
            process.exit(0)
          }
          NODE
